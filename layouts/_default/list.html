{{ define "main" }}
<section class="band page-band">

    <h1>{{ .Title }}</h1>

</section>
<section class="page-body">
  <div class="container narrow">
    <div class="prose">
      {{ .Content }}
    </div>
  </div>
</section>
{{ end }}
