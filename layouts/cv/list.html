{{ define "main" }}
<section class="band page-band">
  <div class="container">
    <h1>{{ .Title }}</h1>
    {{ with .Params.description }}
    <p class="lead">{{ . }}</p>
    {{ end }}
    {{ with .Params.updated }}
    <p class="cv-meta">Last updated {{ . }}</p>
    {{ end }}
  </div>
</section>

<section class="page-body">
  <div class="container">
    {{ $pdf := .Params.pdf | relURL }}
    {{ $pdfv := crypto.MD5 (readFile (printf "static%s" .Params.pdf)) }}
    <div class="cv-viewer reveal" id="cvViewer">
      <iframe src="{{ $pdf }}?v={{ $pdfv }}#view=FitH" title="{{ .Title }} — PDF preview" loading="lazy"></iframe>
      <noscript>
        <p class="cv-fallback">Your browser cannot preview this PDF inline. <a href="{{ .Params.pdf | relURL }}">Open the PDF</a> instead.</p>
      </noscript>
    </div>

    {{ with .Content }}
    <div class="prose">{{ . }}</div>
    {{ end }}
  </div>
</section>
{{ end }}
